<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEME SIZILDI: HACKED BY MUHAMMET ZENCİRCİ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Matrix akışı için */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Matrix Arka Planı */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(20, 0, 0, 0.9);
            padding: 2.5rem;
            border-radius: 10px;
            border: 3px solid #ff0000;
            box-shadow: 0 0 50px #ff0000;
            max-width: 500px;
            width: 85%;
            text-align: center;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 2px 2px #550000;
        }

        .name {
            font-size: 1.8rem;
            color: #fff;
            background: #ff0000;
            padding: 5px 15px;
            display: inline-block;
            margin: 15px 0;
            transform: rotate(-2deg);
        }

        .absurd-text {
            font-size: 0.9rem;
            color: #ff9999;
            margin: 10px 0;
            font-style: italic;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 40px;
            background-color: #ff0000;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn:hover {
            background-color: #fff;
            color: #ff0000;
            box-shadow: 0 0 30px #fff;
        }

        .stats {
            margin-top: 20px;
            font-size: 0.8rem;
            text-align: left;
            border-top: 1px dashed #ff0000;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="card">
        <div style="font-size: 40px;">⚠️ ALERT ⚠️</div>
        <h1>SİSTEMİN KRALI</h1>
        <span class="name">Muhammet Zencirci</span>
        
        <p>İnternet kafe borcun 0 TL olarak güncellendi (çünkü o bir kral).</p>
        
        <div class="absurd-text">
            * Uyarı: penci zorno.<br>
            * Mouse hassasiyeti: %1000000
        </div>

        <div class="stats">
            > Cömertlik: MAX <br>
            > Masa Numarası: allah bilir <br>
            > Durum: Teşekkür edildi.
        </div>
        
        <button class="btn" onclick="absurdFunction()">SİSTEMİ BAŞLAT</button>
    </div>

    <script>
        // Matrix Efekti Scripti
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff0000"; // Kırmızı Matrix
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        function absurdFunction() {
            alert("SİSTEM ÇÖKTÜ! Muhammet çok kral olduğu için devreler yandı!");
            alert("Yükleniyor... %99");
            alert("yüklendi penci zurnalar");
        }
    </script>

</body>
</html>
